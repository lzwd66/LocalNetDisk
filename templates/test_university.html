<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测一测你适合什么大学（大学生版）</title>
    <style>
        body {
            font-family: 'Segoe UI', '微软雅黑', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 4px;          /* 微圆角，保持一点现代感但更锐利 */
            padding: 40px 30px;
            box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.15); /* 硬阴影增加锐度 */
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
        }
        h1 {
            color: #1a1a1a;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .sub {
            color: #555;
            margin-bottom: 30px;
            font-size: 16px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            text-align: left;
            font-weight: 600;
            color: #222;
            margin-bottom: 8px;
            font-size: 15px;
            letter-spacing: 0.5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #aaa;
            border-radius: 0;             /* 完全直角 */
            font-size: 16px;
            box-sizing: border-box;
            transition: border 0.15s;
            outline: none;
            background: #fafafa;
        }
        input[type="text"]:focus {
            border-color: #764ba2;
            box-shadow: 4px 4px 0 rgba(118, 75, 162, 0.2); /* 锐利投影 */
        }
        button {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 0;              /* 直角按钮 */
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.1s ease;
            box-shadow: 4px 4px 0 #764ba2;  /* 硬边阴影 */
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        button:hover {
            background: #2d2d2d;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #5a3a7a;
        }
        button:active {
            transform: translate(0, 0);
            box-shadow: 2px 2px 0 #5a3a7a;
        }
        .footer {
            margin-top: 25px;
            color: #777;
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎓 测一测你适合什么大学</h1>
        <div class="sub">[ 大学生版 ]</div>
        <form method="POST">
            <div class="input-group">
                <label for="university">📚 请输入你所在的大学</label>
                <input type="text" id="university" name="university" 
                       placeholder="例如：清华大学" required autofocus>
            </div>
            <button type="submit">🔮 揭晓答案</button>
        </form>
        <div class="footer">—— 心诚则灵 ——</div>
    </div>
</body>
</html>
